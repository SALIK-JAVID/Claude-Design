<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; background: var(--bg); display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    height: 36px; padding: 0 14px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 500;
    letter-spacing: -0.01em; border-radius: 6px; cursor: pointer;
    transition: all 160ms var(--ease-out);
  }
  .btn-primary { background: var(--accent); color: var(--accent-fg); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background: var(--bg); color: var(--fg); border: 0.5px solid var(--border-strong); box-shadow: var(--shadow-xs); }
  .btn-secondary:hover { background: var(--bg-subtle); }
  .btn-ghost { color: var(--fg-muted); }
  .btn-ghost:hover { color: var(--fg); background: var(--bg-muted); }
  .btn-sm { height: 28px; font-size: 13px; padding: 0 10px; }
  .btn-lg { height: 44px; font-size: 15px; padding: 0 18px; }
  .arrow { font-family: var(--font-sans); font-weight: 400; }
</style>
</head>
<body>
  <button class="btn btn-primary">View work <span class="arrow">↗</span></button>
  <button class="btn btn-secondary">Contact</button>
  <button class="btn btn-ghost">Read more</button>
  <button class="btn btn-secondary btn-sm">Small</button>
  <button class="btn btn-primary btn-lg">Let's talk</button>
</body>
</html>
