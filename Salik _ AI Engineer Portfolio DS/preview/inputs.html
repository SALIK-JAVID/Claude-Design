<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 22px 28px; background: var(--bg); display: grid; gap: 12px; max-width: 500px; }
  .field { display: grid; gap: 6px; }
  .label { font-size: 12px; font-weight: 500; color: var(--fg-muted); letter-spacing: 0.02em; }
  .input, .textarea {
    width: 100%; height: 36px; padding: 0 12px;
    background: var(--bg); color: var(--fg);
    font-family: var(--font-sans); font-size: 14px;
    border: 0.5px solid var(--border-strong); border-radius: 6px;
    outline: none; transition: all 160ms var(--ease-out);
    box-shadow: var(--shadow-xs);
  }
  .input::placeholder { color: var(--fg-faint); }
  .input:focus { border-color: var(--fg); box-shadow: 0 0 0 3px var(--bg-muted); }
  .textarea { height: 72px; padding: 10px 12px; resize: vertical; }
</style>
</head>
<body>
  <div class="field"><span class="label">Email</span><input class="input" placeholder="you@company.com"></div>
  <div class="field"><span class="label">Project</span><input class="input" value="Agentic research assistant"></div>
  <div class="field"><span class="label">Message</span><textarea class="textarea" placeholder="What are you trying to un-stick?"></textarea></div>
</body>
</html>
