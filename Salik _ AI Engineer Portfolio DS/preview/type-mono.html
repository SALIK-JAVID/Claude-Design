<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 26px 32px; background: var(--bg); display: grid; gap: 18px; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-subtle); font-family: var(--font-mono); }
  .mono-line { font-family: var(--font-mono); font-size: 14px; color: var(--fg); }
  .mono-line .c { color: var(--fg-subtle); }
  .code-block { font-family: var(--font-mono); font-size: 13px; background: var(--bg-muted); padding: 14px 16px; border-radius: 6px; border: 0.5px solid var(--border); color: var(--fg); }
  .code-block .k { color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="eyebrow">SELECTED WORK — 2024 / 25</div>
  <div class="mono-line">ts · react · postgres · pgvector <span class="c">// tech stack</span></div>
  <div class="code-block"><span class="k">const</span> agent = <span class="k">await</span> createAgent({ tools, memory });</div>
</body>
</html>
