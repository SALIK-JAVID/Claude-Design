<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px 28px 24px; background: var(--bg-subtle); display: flex; gap: 32px; justify-content: space-around; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .box { width: 96px; height: 60px; background: var(--bg); border-radius: 8px; }
  .xs { box-shadow: var(--shadow-xs); }
  .sm { box-shadow: var(--shadow-sm); }
  .md { box-shadow: var(--shadow-md); }
  .lg { box-shadow: var(--shadow-lg); }
  .xl { box-shadow: var(--shadow-xl); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); }
</style>
</head>
<body>
  <div class="item"><div class="box xs"></div><span class="lbl">xs · hairline</span></div>
  <div class="item"><div class="box sm"></div><span class="lbl">sm · card</span></div>
  <div class="item"><div class="box md"></div><span class="lbl">md · hover</span></div>
  <div class="item"><div class="box lg"></div><span class="lbl">lg · menu</span></div>
  <div class="item"><div class="box xl"></div><span class="lbl">xl · modal</span></div>
</body>
</html>
